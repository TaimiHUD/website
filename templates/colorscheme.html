<!-- Component for persistent user color scheme selection -->

<!--
  Motivation:
    * Allow for auto-detection via prefers-color-scheme (color-scheme: light dark)
    * Allow for providing a color scheme by user preference anyway
    * Fail (relatively) quietly without Javascript

  How it works:
    * The hidden radios are the CSS mechanism: html:has(#color-scheme-*:checked)
      pins the color-scheme property, and every light-dark() value follows.
    * The button cycles auto -> light -> dark and shows an icon for the
      CURRENT state; which icon is visible is also driven by :has().
    * Javascript only persists the choice (localStorage) and advances the
      cycle; without it the component stays hidden and the system scheme rules.
-->

<div class="color-scheme nonoscript">
  <input name="color-scheme" type="radio" id="color-scheme-dark" value="dark" hidden>
  <input name="color-scheme" type="radio" id="color-scheme-light" value="light" hidden>
  <button
    id="color-scheme-cycle"
    type="button"
    aria-label="Color scheme: cycles between auto, light, and dark"
    title="Color scheme: auto &rarr; light &rarr; dark"
  >
    <span class="scheme-icon scheme-icon-auto" aria-hidden="true"></span>
    <span class="scheme-icon scheme-icon-light" aria-hidden="true"></span>
    <span class="scheme-icon scheme-icon-dark" aria-hidden="true"></span>
  </button>
</div>

<script>
  (function() {
    var dark = document.getElementById("color-scheme-dark");
    var light = document.getElementById("color-scheme-light");
    var saved = localStorage.getItem("color-scheme");
    dark.checked = saved === "dark";
    light.checked = saved === "light";
    document.getElementById("color-scheme-cycle").addEventListener("click", function() {
      if (dark.checked) {
        dark.checked = false;
        localStorage.removeItem("color-scheme");
      } else if (light.checked) {
        light.checked = false;
        dark.checked = true;
        localStorage.setItem("color-scheme", "dark");
      } else {
        light.checked = true;
        localStorage.setItem("color-scheme", "light");
      }
    });
  })();
</script>
<!-- End of component for color scheme selection -->
